name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install git+https://github.com/kivy/buildozer.git@master
          pip install cython==0.29.33
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev lldb lld cmake uuid-dev libffi-dev fonts-dejavu-core

      - name: Copy Stable Arabic Font
        run: |
          cp /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf ./arabic_font.ttf

      - name: Create main.py
        run: |
          cat << 'EOF' > main.py
          import os
          os.environ['SSL_CERT_FILE'] = '/etc/ssl/certs/ca-certificates.crt'
          from kivy.app import App
          from kivy.uix.boxlayout import BoxLayout
          from kivy.uix.label import Label
          from kivy.uix.textinput import TextInput
          from kivy.uix.button import Button
          from kivy.uix.scrollview import ScrollView
          from kivy.network.urlrequest import UrlRequest
          from kivy.core.window import Window
          import urllib.parse
          import ssl
          import re
          import arabic_reshaper
          from bidi.algorithm import get_display

          try:
              _create_unverified_https_context = ssl._create_unverified_context
          except AttributeError:
              pass
          else:
              ssl._create_default_https_context = _create_unverified_https_context

          FONT_PATH = "arabic_font.ttf" if os.path.exists("arabic_font.ttf") else "Roboto"

          def is_arabic(text):
              return any('\u0600' <= c <= '\u06FF' for c in text)

          def fix_text(text):
              if not text:
                  return ""
              # تنظيف الرموز الغريبة التي تسبب مربعات [] مع الحفاظ على الحروف العربية والإنجليزية والأرقام
              text = re.sub(r'[^\w\s\d\.\،\؟\!\:\-\/\(\)\u0600-\u06FF]', '', text)
              paragraphs = text.split('\n')
              fixed_paragraphs = []
              for p in paragraphs:
                  if is_arabic(p):
                      reshaped_text = arabic_reshaper.reshape(p)
                      bidi_text = get_display(reshaped_text)
                      fixed_paragraphs.append(bidi_text)
                  else:
                      fixed_paragraphs.append(p)
              return '\n'.join(fixed_paragraphs)

          class DynamicTextInput(TextInput):
              def __init__(self, **kwargs):
                  super(DynamicTextInput, self).__init__(**kwargs)
                  self.font_name = FONT_PATH
                  self.bind(text=self.on_text_change)

              def on_text_change(self, instance, value):
                  if hasattr(self, '_updating') and self._updating:
                      return
                  self._updating = True
                  
                  # إذا كان النص يحتوي على عربي نقوم بتشكيله، وإذا كان إنجليزي يترك كما هو لتفادي المربعات
                  if is_arabic(value):
                      reshaped = arabic_reshaper.reshape(value)
                      self.text = get_display(reshaped)
                  self._updating = False

          class AIAssistantUI(BoxLayout):
              def __init__(self, **kwargs):
                  super(AIAssistantUI, self).__init__(**kwargs)
                  self.orientation = 'vertical'
                  self.padding = 20
                  self.spacing = 10
                  
                  # منع اختفاء صندوق النص خلف لوحة المفاتيح
                  Window.bind(on_keyboard_height=self.adjust_for_keyboard)
                  
                  # العنوان العلوي
                  self.title_label = Label(text=fix_text("المساعد الذكي / AI Assistant"), font_name=FONT_PATH, font_size='22sp', size_hint_y=0.08)
                  self.add_widget(self.title_label)
                  
                  # منطقة عرض الإجابات
                  self.scroll_view = ScrollView(size_hint_y=0.62)
                  self.output_label = Label(
                      text=fix_text("تم الاتصال! اسألني أي سؤال الآن..."), 
                      font_name=FONT_PATH,
                      font_size='16sp', 
                      size_hint_y=None, 
                      halign='center', 
                      valign='top',
                      markup=True
                  )
                  self.output_label.bind(texture_size=self.update_label_height)
                  self.scroll_view.add_widget(self.output_label)
                  self.add_widget(self.scroll_view)
                  
                  # صندوق الإدخال الذكي المشترك للعربي والإنجليزي
                  self.text_input = DynamicTextInput(
                      hint_text=get_display(arabic_reshaper.reshape("اكتب سؤالك هنا... / Type here...")),
                      multiline=False, 
                      size_hint_y=0.12
                  )
                  self.add_widget(self.text_input)
                  
                  # شريط الأزرار السفلي (إرسال + المايك)
                  self.buttons_layout = BoxLayout(orientation='horizontal', size_hint_y=0.12, spacing=10)
                  
                  self.send_btn = Button(text=fix_text("إرسال / Send"), font_name=FONT_PATH, size_hint_x=0.75, background_color=(0.0, 0.4, 0.8, 1.0))
                  self.send_btn.bind(on_press=self.ask_ai)
                  
                  # مكان المايك المحجوز للمستقبل
                  self.mic_btn = Button(text="🎤", font_name=FONT_PATH, size_hint_x=0.25, background_color=(0.2, 0.2, 0.2, 1.0))
                  
                  self.buttons_layout.add_widget(self.mic_btn)
                  self.buttons_layout.add_widget(self.send_btn)
                  self.add_widget(self.buttons_layout)

              def adjust_for_keyboard(self, window, height):
                  # رفع الواجهة بالكامل للأعلى عند ظهور لوحة المفاتيح
                  if height > 0:
                      self.padding = [20, height + 10, 20, 10]
                  else:
                      self.padding = [20, 20, 20, 20]

              def update_label_height(self, instance, size):
                  self.output_label.height = size[1]
                  self.output_label.text_size = (self.width, None)

              def ask_ai(self, instance):
                  user_text = self.text_input.text.strip()
                  if user_text:
                      self.output_label.text = fix_text("جاري التفكير... / Thinking...")
                      self.text_input.text = ""
                      encoded_text = urllib.parse.quote(user_text)
                      url = f"https://text.pollinations.ai/{encoded_text}"
                      headers = {'User-Agent': 'Mozilla/5.0'}
                      try:
                          UrlRequest(url, req_headers=headers, on_success=self.got_response, on_failure=self.got_error, on_error=self.got_error, timeout=30)
                      except Exception as e:
                          self.output_label.text = fix_text(f"خطأ في الاتصال: {str(e)}")

              def got_response(self, request, result):
                  self.output_label.text = fix_text(str(result).strip())

              def got_error(self, request, error):
                  self.output_label.text = fix_text(f"خطأ: {str(error)}")

          class AIAssistantApp(App):
              def build(self): return AIAssistantUI()

          if __name__ == '__main__':
              AIAssistantApp().run()
          EOF

      - name: Create buildozer.spec
        run: |
          cat << 'EOF' > buildozer.spec
          [app]
          title = AI Assistant
          package.name = myapp
          package.domain = org.test
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas,ttf
          version = 0.7
          requirements = python3,kivy,requests,urllib3,certifi,arabic-reshaper,python-bidi
          orientation = portrait
          fullscreen = 0
          android.permissions = INTERNET, RECORD_AUDIO
          android.api = 31
          android.minapi = 21
          android.ndk_api = 21
          android.archs = arm64-v8a, armeabi-v7a
          p4a.branch = master

          [buildozer]
          log_level = 2
          warn_on_root = 0
          EOF

      - name: Build with Buildozer
        run: |
          yes | buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Assistant-APK
          path: bin/*.apk
