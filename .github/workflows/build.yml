name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install git+https://github.com/kivy/buildozer.git@master
          pip install cython==0.29.33
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev lldb lld cmake uuid-dev libffi-dev

      - name: Create main.py
        run: |
          cat << 'EOF' > main.py
          import os
          os.environ['SSL_CERT_FILE'] = '/etc/ssl/certs/ca-certificates.crt'
          from kivy.app import App
          from kivy.uix.boxlayout import BoxLayout
          from kivy.uix.label import Label
          from kivy.uix.textinput import TextInput
          from kivy.uix.button import Button
          from kivy.uix.scrollview import ScrollView
          from kivy.network.urlrequest import UrlRequest
          import urllib.parse
          import ssl
          import re
          import arabic_reshaper
          from bidi.algorithm import get_display

          try:
              _create_unverified_https_context = ssl._create_unverified_context
          except AttributeError:
              pass
          else:
              ssl._create_default_https_context = _create_unverified_https_context

          def fix_text(text):
              # 1. تنظيف النجوم وتحويلها لتنسيق سميك يفهمه تطبيق الكيوي
              text = re.sub(r'\*\*(.*?)\*\*|__(.__?)\_\_', r'[b]\1\2[/b]', text)
              
              # 2. فحص الحروف العربية وتعديل اتجاهها لتظهر متصلة ومن اليمين لليسار
              paragraphs = text.split('\n')
              fixed_paragraphs = []
              for p in paragraphs:
                  if any('\u0600' <= c <= '\u06FF' for c in p):
                      reshaped_text = arabic_reshaper.reshape(p)
                      bidi_text = get_display(reshaped_text)
                      fixed_paragraphs.append(bidi_text)
                  else:
                      fixed_paragraphs.append(p)
              return '\n'.join(fixed_paragraphs)

          class AIAssistantUI(BoxLayout):
              def __init__(self, **kwargs):
                  super(AIAssistantUI, self).__init__(**kwargs)
                  self.orientation = 'vertical'
                  self.padding = 20
                  self.spacing = 10
                  
                  self.add_widget(Label(text="AI Assistant", font_size='28sp', size_hint_y=0.1))
                  
                  self.scroll_view = ScrollView(size_hint_y=0.6)
                  # تفعيل markup لعرض الخط العريض بشكل سليم بدون ظهور النجوم
                  self.output_label = Label(
                      text=fix_text("Connected! Ask me any question safely now..."), 
                      font_size='16sp', 
                      size_hint_y=None, 
                      halign='center', 
                      valign='top',
                      markup=True
                  )
                  self.output_label.bind(texture_size=self.update_label_height)
                  self.scroll_view.add_widget(self.output_label)
                  self.add_widget(self.scroll_view)
                  
                  self.text_input = TextInput(hint_text="Type your question here...", multiline=False, size_hint_y=0.15)
                  self.add_widget(self.text_input)
                  
                  self.send_btn = Button(text="Send to AI", size_hint_y=0.15, background_color=(0, 0.5, 1, 1))
                  self.send_btn.bind(on_press=self.ask_ai)
                  self.add_widget(self.send_btn)

              def update_label_height(self, instance, size):
                  self.output_label.height = size[1]
                  self.output_label.text_size = (self.width, None)

              def ask_ai(self, instance):
                  user_text = self.text_input.text.strip()
                  if user_text:
                      self.output_label.text = fix_text("Thinking...")
                      self.text_input.text = ""
                      encoded_text = urllib.parse.quote(user_text)
                      url = f"https://text.pollinations.ai/{encoded_text}"
                      headers = {'User-Agent': 'Mozilla/5.0'}
                      try:
                          UrlRequest(url, req_headers=headers, on_success=self.got_response, on_failure=self.got_error, on_error=self.got_error, timeout=20)
                      except Exception as e:
                          self.output_label.text = fix_text(f"Connection error: {str(e)}")

              def got_response(self, request, result):
                  self.output_label.text = fix_text(str(result).strip())

              def got_error(self, request, error):
                  self.output_label.text = fix_text(f"Connection error: {str(error)}")

          class AIAssistantApp(App):
              def build(self): return AIAssistantUI()

          if __name__ == '__main__':
              AIAssistantApp().run()
          EOF

      - name: Create buildozer.spec
        run: |
          cat << 'EOF' > buildozer.spec
          [app]
          title = AI Assistant
          package.name = myapp
          package.domain = org.test
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas
          version = 0.2
          requirements = python3,kivy,requests,urllib3,certifi,arabic-reshaper,python-bidi
          orientation = portrait
          fullscreen = 0
          android.permissions = INTERNET
          android.api = 31
          android.minapi = 21
          android.ndk_api = 21
          android.archs = arm64-v8a, armeabi-v7a
          p4a.branch = master

          [buildozer]
          log_level = 2
          warn_on_root = 0
          EOF

      - name: Build with Buildozer
        run: |
          yes | buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Assistant-APK
          path: bin/*.apk
