name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install git+https://github.com/kivy/buildozer.git@master
          pip install cython==0.29.33
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev lldb lld cmake uuid-dev libffi-dev fonts-dejavu-core

      - name: Copy Combined Font
        run: |
          cp /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf ./combined_font.ttf

      - name: Create main.py
        run: |
          cat << 'EOF' > main.py
          import os
          os.environ['SSL_CERT_FILE'] = '/etc/ssl/certs/ca-certificates.crt'
          from kivy.app import App
          from kivy.uix.boxlayout import BoxLayout
          from kivy.uix.label import Label
          from kivy.uix.textinput import TextInput
          from kivy.uix.button import Button
          from kivy.uix.scrollview import ScrollView
          from kivy.network.urlrequest import UrlRequest
          from kivy.core.window import Window
          import urllib.parse
          import ssl
          import re
          import arabic_reshaper
          from bidi.algorithm import get_display

          try:
              _create_unverified_https_context = ssl._create_unverified_context
          except AttributeError:
              pass
          else:
              ssl._create_default_https_context = _create_unverified_https_context

          # إجبار نافذة التطبيق برمجياً على الارتفاع وتغيير الحجم فور ظهور لوحة المفاتيح
          Window.softinput_mode = 'resize'

          FONT_PATH = "combined_font.ttf" if os.path.exists("combined_font.ttf") else "Roboto"

          def fix_text(text):
              if not text:
                  return ""
              
              # تنظيف النصوص من الرموز العشوائية لمنع تشويه المربعات
              text = re.sub(r'[^\w\s\d\.\،\؟\!\:\-\/\(\)\u0600-\u06FF]', '', text)
              
              # معالجة كل سطر بشكل منفصل لدعم النصوص الطويلة المدمجة
              lines = text.split('\n')
              fixed_lines = []
              for line in lines:
                  if any('\u0600' <= c <= '\u06FF' for c in line):
                      # تشكيل الكلمات العربية وقلب اتجاهها لتظهر متصلة من اليمين للياسر
                      reshaped = arabic_reshaper.reshape(line)
                      bidi_line = get_display(reshaped)
                      fixed_lines.append(bidi_line)
                  else:
                      fixed_lines.append(line)
              return '\n'.join(fixed_lines)

          class AIAssistantUI(BoxLayout):
              def __init__(self, **kwargs):
                  super(AIAssistantUI, self).__init__(**kwargs)
                  self.orientation = 'vertical'
                  self.padding = [15, 15, 15, 15]
                  self.spacing = 10
                  
                  # شريط العنوان العلوي
                  self.title_label = Label(text=fix_text("المساعد الذكي / AI Assistant"), font_name=FONT_PATH, font_size='22sp', size_hint_y=0.08)
                  self.add_widget(self.title_label)
                  
                  # منطقة عرض الرسائل المدعومة بالتمرير لأسفل وأعلى
                  self.scroll_view = ScrollView(size_hint_y=0.68)
                  self.output_label = Label(
                      text=fix_text("تم الاتصال بنجاح! اسألني أي سؤال بالعربية أو الإنجليزية..."), 
                      font_name=FONT_PATH,
                      font_size='16sp', 
                      size_hint_y=None, 
                      halign='center', 
                      valign='top'
                  )
                  self.output_label.bind(texture_size=self.update_label_height)
                  self.scroll_view.add_widget(self.output_label)
                  self.add_widget(self.scroll_view)
                  
                  # صندوق كتابة النصوص المستقر والذكي
                  self.text_input = TextInput(
                      hint_text="Type here... / اكتب هنا...",
                      font_name=FONT_PATH,
                      multiline=False, 
                      size_hint_y=0.12
                  )
                  self.add_widget(self.text_input)
                  
                  # الأزرار السفلية
                  self.buttons_layout = BoxLayout(orientation='horizontal', size_hint_y=0.12, spacing=10)
                  self.send_btn = Button(text=fix_text("إرسال / Send"), font_name=FONT_PATH, size_hint_x=0.75, background_color=(0, 0.4, 0.9, 1))
                  self.send_btn.bind(on_press=self.ask_ai)
                  
                  self.mic_btn = Button(text="🎤", font_name=FONT_PATH, size_hint_x=0.25, background_color=(0.2, 0.2, 0.2, 1))
                  
                  self.buttons_layout.add_widget(self.mic_btn)
                  self.buttons_layout.add_widget(self.send_btn)
                  self.add_widget(self.buttons_layout)

              def update_label_height(self, instance, size):
                  self.output_label.height = size[1]
                  self.output_label.text_size = (self.width, None)

              def ask_ai(self, instance):
                  user_text = self.text_input.text.strip()
                  if user_text:
                      self.output_label.text = fix_text("جاري التفكير... / Thinking...")
                      self.text_input.text = ""
                      encoded_text = urllib.parse.quote(user_text)
                      url = f"https://text.pollinations.ai/{encoded_text}"
                      headers = {'User-Agent': 'Mozilla/5.0'}
                      try:
                          UrlRequest(url, req_headers=headers, on_success=self.got_response, on_failure=self.got_error, on_error=self.got_error, timeout=40)
                      except Exception as e:
                          self.output_label.text = fix_text(f"خطأ في الاتصال: {str(e)}")

              def got_response(self, request, result):
                  # معالجة الرد العربي القادم لكي يظهر منسقاً ومتصلاً تماماً
                  self.output_label.text = fix_text(str(result).strip())

              def got_error(self, request, error):
                  self.output_label.text = fix_text(f"خطأ في الخادم أو انتهاء الوقت.")

          class AIAssistantApp(App):
              def build(self): return AIAssistantUI()

          if __name__ == '__main__':
              AIAssistantApp().run()
          EOF

      - name: Create buildozer.spec
        run: |
          cat << 'EOF' > buildozer.spec
          [app]
          title = AI Assistant
          package.name = myapp
          package.domain = org.test
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas,ttf
          version = 0.8
          requirements = python3,kivy,requests,urllib3,certifi,arabic-reshaper,python-bidi
          orientation = portrait
          fullscreen = 0
          android.permissions = INTERNET, RECORD_AUDIO
          android.api = 31
          android.minapi = 21
          android.ndk_api = 21
          android.archs = arm64-v8a, armeabi-v7a
          p4a.branch = master
          android.window_soft_input_mode = resize

          [buildozer]
          log_level = 2
          warn_on_root = 0
          EOF

      - name: Build with Buildozer
        run: |
          yes | buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Assistant-APK
          path: bin/*.apk
